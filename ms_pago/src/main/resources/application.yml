server:
  port: 8084

spring:
  application:
    name: ms-pago
    
  datasource:
    url: jdbc:mysql://localhost:3306/ms_pago_db?creat
    username: root
    password: ''
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    path: /ms-pago/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
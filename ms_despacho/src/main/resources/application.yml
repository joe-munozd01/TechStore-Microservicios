server:
  port: 8088

spring:
  application:
    name: ms-despacho
  
  datasource:
    url: jdbc:mysql://localhost:3306/techstore_despacho_db
    username: root
    password: ''
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    path: /ms-despacho/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
